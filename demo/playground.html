<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axon Playground — v0.9.8</title>
  <style>
    /* ── Synthwave palette ─────────────────────────────────────────────────── */
    :root {
      --bg:          #0d0221;
      --bg-panel:    #120330;
      --bg-editor:   #0a0118;
      --bg-output:   #0c0228;
      --text:        #e2d5ff;
      --text-dim:    #8060b0;
      --text-muted:  #5a3d80;
      --pink:        #ff2d78;
      --cyan:        #00d4ff;
      --purple:      #b060ff;
      --amber:       #ffb020;
      --green:       #00e5a0;
      --red:         #ff5566;
      --border:      rgba(176,96,255,0.2);
      --glow-pink:   0 0 20px rgba(255,45,120,0.35);
      --glow-cyan:   0 0 20px rgba(0,212,255,0.35);
      --radius:      8px;
      --header-h:    56px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    .page-header {
      height: var(--header-h);
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(176,96,255,0.1) 0%, var(--bg-panel) 100%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
    }
    .header-logo { font-size: 22px; line-height: 1; filter: drop-shadow(0 0 8px rgba(176,96,255,0.6)); }
    .header-title {
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--purple) 0%, var(--cyan) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header-badge {
      background: rgba(176,96,255,0.12);
      border: 1px solid rgba(176,96,255,0.3);
      color: var(--purple);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.05em;
    }
    .header-sep { flex: 1; }
    .header-example-label { font-size: 12px; color: var(--text-muted); }
    .header-examples {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 5px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      outline: none;
      max-width: 200px;
    }
    .header-examples:focus { border-color: var(--purple); }
    .header-examples option { background: #1a0440; }
    .header-nav {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: color 0.15s, border-color 0.15s;
    }
    .header-nav:hover { color: var(--text); border-color: var(--purple); }

    /* ── Toolbar ─────────────────────────────────────────────────────────────── */
    .toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.12s, box-shadow 0.12s;
      letter-spacing: 0.3px;
    }
    .btn-run {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
    }
    .btn-run:hover { opacity: 0.88; box-shadow: var(--glow-pink); }
    .btn-fmt {
      background: var(--bg-editor);
      border: 1px solid var(--border);
      color: var(--cyan);
    }
    .btn-fmt:hover { border-color: var(--cyan); box-shadow: var(--glow-cyan); }
    .btn-clear {
      background: var(--bg-editor);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-clear:hover { border-color: var(--border); color: var(--text); }
    .toolbar-sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
    .auto-label {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
    }
    .auto-label input[type=checkbox] { accent-color: var(--purple); }
    .status-pill {
      margin-left: auto;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid;
      transition: all 0.2s;
    }
    .status-ok    { color: var(--green);  border-color: rgba(0,229,160,0.35); background: rgba(0,229,160,0.08); }
    .status-error { color: var(--red);    border-color: rgba(255,85,102,0.35); background: rgba(255,85,102,0.08); }
    .status-warn  { color: var(--amber);  border-color: rgba(255,176,32,0.35); background: rgba(255,176,32,0.08); }
    .status-idle  { color: var(--text-muted); border-color: var(--border); background: transparent; }

    /* ── Split pane ──────────────────────────────────────────────────────────── */
    .split-pane {
      flex: 1;
      display: flex;
      flex-direction: row;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Drag divider ────────────────────────────────────────────────────────── */
    .split-divider {
      flex-shrink: 0;
      width: 5px;
      background: var(--border);
      cursor: col-resize;
      transition: background 0.15s;
      position: relative;
      z-index: 10;
    }
    .split-divider::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 1px; height: 32px;
      background: rgba(176,96,255,0.5);
      border-radius: 2px;
    }
    .split-divider:hover, .split-divider.dragging {
      background: rgba(176,96,255,0.4);
    }

    /* ── Editor pane ─────────────────────────────────────────────────────────── */
    .editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }
    .pane-label {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      background: rgba(176,96,255,0.04);
    }
    .pane-label span { color: var(--purple); }
    .editor-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }
    .line-nums {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 44px;
      padding: 14px 8px 14px 0;
      text-align: right;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-muted);
      background: var(--bg-editor);
      border-right: 1px solid var(--border);
      user-select: none;
      /* scrollable so JS scrollTop sync works; bars hidden visually */
      overflow-y: scroll;
      scrollbar-width: none;
      -ms-overflow-style: none;
      pointer-events: none;
      white-space: pre; /* preserve \n between line numbers */
    }
    .line-nums::-webkit-scrollbar { display: none; }
    /* Syntax-highlight layer — sits behind the transparent textarea */
    #editor-hl {
      position: absolute;
      top: 0; left: 44px; right: 0; bottom: 0;
      padding: 14px 16px;
      margin: 0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg-editor);
      border: none;
      outline: none;
      white-space: pre;
      overflow-wrap: normal;
      overflow: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      tab-size: 2;
      pointer-events: none;
      z-index: 0;
      word-spacing: normal;
      letter-spacing: normal;
    }
    #editor-hl::-webkit-scrollbar { display: none; }
    #editor {
      position: absolute;
      top: 0; left: 44px; right: 0; bottom: 0;
      padding: 14px 16px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.65;
      color: transparent;
      caret-color: var(--pink);
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      white-space: pre;
      overflow-wrap: normal;
      overflow: auto;
      tab-size: 2;
      z-index: 1;
    }
    #editor::selection { background: rgba(176,96,255,0.35); }

    /* ── Error underline overlay ─────────────────────────────────────────────── */
    .error-bar {
      flex-shrink: 0;
      min-height: 0;
      max-height: 80px;
      overflow-y: auto;
      border-top: 1px solid rgba(255,85,102,0.3);
      background: rgba(255,85,102,0.06);
    }
    .error-bar:empty { display: none; }
    .error-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 14px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: var(--red);
      border-bottom: 1px solid rgba(255,85,102,0.1);
    }
    .error-item:last-child { border-bottom: none; }
    .error-loc { color: rgba(255,85,102,0.6); flex-shrink: 0; }
    .warn-item { color: var(--amber); }
    .warn-item .error-loc { color: rgba(255,176,32,0.6); }

    /* ── Output pane ─────────────────────────────────────────────────────────── */
    .output-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }
    .output-tabs {
      flex-shrink: 0;
      display: flex;
      border-bottom: 1px solid var(--border);
      background: rgba(0,212,255,0.03);
    }
    .output-tab {
      padding: 6px 18px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: inherit;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      transition: color 0.12s, border-color 0.12s;
    }
    .output-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .output-tab:hover:not(.active) { color: var(--text); }
    .output-content {
      flex: 1;
      overflow: auto;
      min-height: 0;
      min-width: 0;
    }
    .output-content.hidden { display: none; }
    pre.output-code {
      padding: 14px 16px;
      font-family: 'Courier New', monospace;
      font-size: 12.5px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre;
      overflow-x: auto; /* belt-and-suspenders for wide lines */
      background: var(--bg-output);
    }
    pre.output-code .kw  { color: #ff79c6; }
    pre.output-code .cn  { color: #50fa7b; }
    pre.output-code .str { color: #f1fa8c; }
    pre.output-code .cmt { color: #6272a4; font-style: italic; }
    pre.output-code .num { color: #bd93f9; }
    pre.output-code .punc { color: #ff79c6; opacity: 0.7; }
    /* Editor highlight layer token colours */
    #editor-hl .kw   { color: #ff79c6; }
    #editor-hl .str  { color: #f1fa8c; }
    #editor-hl .cmt  { color: #6272a4; font-style: italic; }
    #editor-hl .num  { color: #bd93f9; }
    #editor-hl .ann  { color: #50fa7b; }
    #editor-hl .op   { color: #ff79c6; opacity: 0.85; }
    #editor-hl .bool { color: #bd93f9; }
    #editor-hl .ty   { color: #8be9fd; }

    .result-pane {
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.65;
      background: var(--bg-output);
    }
    .result-line {
      display: flex;
      gap: 10px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(176,96,255,0.06);
    }
    .result-line:last-child { border-bottom: none; }
    .result-prompt { color: var(--purple); flex-shrink: 0; }
    .result-value  { color: var(--green); word-break: break-all; }
    .result-error  { color: var(--red); }
    .result-log    { color: var(--text-dim); }
    .result-empty  { color: var(--text-muted); font-style: italic; padding: 8px 0; }

    /* ── Responsive ──────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .split-pane { flex-direction: column; }
      .split-divider {
        width: 100%; height: 5px;
        cursor: row-resize;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }
      .split-divider::after {
        width: 32px; height: 1px;
      }
      .editor-pane { border-right: none; }
      .header-example-label { display: none; }
      .header-examples { max-width: 140px; }
    }
    @media (max-width: 480px) {
      .page-header { padding: 0 12px; gap: 6px; }
      .header-title { font-size: 14px; }
      .header-badge { display: none; }
      .header-nav { padding: 4px 8px; font-size: 11px; }
      .header-examples { max-width: 110px; font-size: 11px; }
      .toolbar { padding: 5px 10px; gap: 5px; }
      .btn { padding: 5px 10px; font-size: 11px; }
      .auto-label { display: none; }
      .toolbar-sep { display: none; }
    }
  </style>
</head>
<body>

<header class="page-header">
  <div class="header-logo">⬡</div>
  <div class="header-title">Axon Playground</div>
  <div class="header-badge">v0.9.8</div>
  <div class="header-sep"></div>
  <label class="header-example-label" for="example-select">Examples:</label>
  <select class="header-examples" id="example-select" onchange="loadExample(this.value)">
    <option value="">— choose an example —</option>
    <option value="hello">Hello, Cruel World</option>
    <option value="fib">Fibonacci — The Golden Ratio</option>
    <option value="types">Rocket Launch Clearance</option>
    <option value="match">Space Weather Alerts</option>
    <option value="generics">Generics + Interfaces</option>
    <option value="pipeline">Weekly Music Chart</option>
    <option value="store">Reactive Store</option>
    <option value="async">Async / Await</option>
    <option value="errors">Restaurant Order Validator</option>
    <option value="loops">Prime Number Sieve</option>
    <option value="enums">Mission Checklist</option>
    <option value="numbers">Numeric Literals</option>
    <option value="compound">Road Trip Tracker</option>
    <option value="stdlib">Mission Log Processor</option>
    <option value="while">While Loops</option>
    <option value="multilambda">Recipe Difficulty Ranker</option>
  </select>
  <a class="header-nav" href="landing.html">← Axon</a>
</header>

<div class="toolbar">
  <button class="btn btn-run" onclick="runCode()" title="Run (Ctrl+Enter)">▶ Run</button>
  <button class="btn btn-fmt" onclick="fmtCode()" title="Format source">⌥ Format</button>
  <button class="btn btn-clear" onclick="clearOutput()">✕ Clear</button>
  <div class="toolbar-sep"></div>
  <label class="auto-label" title="Compile as you type">
    <input type="checkbox" id="auto-run" checked /> Auto-compile
  </label>
  <div class="status-pill status-idle" id="status-pill">idle</div>
</div>

<div class="split-pane">
  <!-- ── Editor ────────────────────────────────────────────────────────────── -->
  <div class="editor-pane">
    <div class="pane-label">
      <span>Axon source</span>
      <span id="line-col">line 1, col 1</span>
    </div>
    <div class="editor-wrap">
      <div class="line-nums" id="line-nums">1</div>
      <pre id="editor-hl" aria-hidden="true"></pre>
      <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
    <div class="error-bar" id="error-bar"></div>
  </div>

  <!-- ── Drag divider ─────────────────────────────────────────────────────── -->
  <div class="split-divider" id="split-divider"></div>

  <!-- ── Output ────────────────────────────────────────────────────────────── -->
  <div class="output-pane">
    <div class="output-tabs">
      <button class="output-tab active" onclick="switchTab('js')"   id="tab-js">Transpiled JS</button>
      <button class="output-tab"        onclick="switchTab('result')" id="tab-result">Live Result</button>
    </div>
    <div class="output-content" id="pane-js">
      <pre class="output-code" id="js-output"><span style="color:var(--text-muted);font-style:italic">// transpiled JavaScript will appear here</span></pre>
    </div>
    <div class="output-content hidden" id="pane-result">
      <div class="result-pane" id="result-output">
        <div class="result-empty">Run your code to see the result.</div>
      </div>
    </div>
  </div>
</div>

<!-- ── Compiler bundle ───────────────────────────────────────────────────────── -->
<script src="axon.compiler.js?v=0.9.8-249476e"></script>

<script>
// ── Example snippets ─────────────────────────────────────────────────────────
const EXAMPLES = {
  hello: `// Hello, Cruel World
console.log("Hello, World!")
console.log("...")
console.log("Actually — hold on.")
console.log("Is it a good world? The evidence is mixed.")
console.log("The compiler has no opinion on the matter.")
console.log("It just runs the code and minds its business.")
console.log("")
console.log("Hello anyway. You've earned it.")`,

  vibes: `// Vibe Check — Enums
// Because some situations require more than a boolean

enum Vibe = Immaculate | Questionable | Concerning | CallALawyer

fn check_vibe(situation: string) -> Vibe {
  match situation {
    | "free pizza in the break room"  => Vibe.Immaculate
    | "reply-all email chain"         => Vibe.Concerning
    | "surprise all-hands at 4pm"     => Vibe.CallALawyer
    | "someone microwaved fish again" => Vibe.Concerning
    | _                               => Vibe.Questionable
  }
}

let situations = [
  "free pizza in the break room",
  "reply-all email chain",
  "surprise all-hands at 4pm",
  "someone microwaved fish again",
  "monday",
  "calendar invite with no agenda",
]

for s in situations {
  let v     = check_vibe(s)
  let label = match v {
    | Vibe.Immaculate   => "✓  Immaculate"
    | Vibe.Questionable => "?  Questionable"
    | Vibe.Concerning   => "⚠  Concerning"
    | Vibe.CallALawyer  => "!! Call A Lawyer"
  }
  console.log(pad_end(s, 36) + label)
}`,

  password: `// Password From Hell — Constrained Types + Functions
// The validator nobody asked for

fn rate_password(pw: string) -> string {
  if pw.length < 6    { return "Nice try. That is just a word." }
  if pw == "password" { return "Sir. Ma am. Please." }
  if pw == "123456"   { return "Is that the combination to your luggage?" }
  if pw.length < 10   { return "A hacker s warm-up exercise." }
  if pw.length < 16   { return "Acceptable. Barely." }
  "Fort Knox energy. Respect."
}

let attempts = [
  "abc",
  "password",
  "123456",
  "letmein7",
  "correcthorse",
  "correcthorsebatterystaple",
  "xK9#mP2qL7vR4wN8zT1yC6uA3sB0",
]

console.log("=== PASSWORD STRENGTH REPORT ===")
console.log("")
for p in attempts {
  console.log(pad_end(p, 32) + rate_password(p))
}`,

  horoscope: `// Horoscope Machine — Pattern Matching
// Certified meaningless. Consult stars at own risk.

fn daily_reading(sign: string) -> string {
  match sign {
    | "aries"       => "Bold decision incoming. It will be wrong, but boldly so."
    | "taurus"      => "Mercury is in retrograde. Also you left the oven on."
    | "gemini"      => "Both personalities argue today. Neither wins."
    | "cancer"      => "The stars say stay in bed. For once the stars are correct."
    | "leo"         => "You are the main character. So is everyone else. Good luck."
    | "virgo"       => "You will reorganise something that did not need reorganising."
    | "libra"       => "Forty-five minutes choosing a restaurant. Wrong one."
    | "scorpio"     => "Someone is thinking about you. Not in a great way."
    | "sagittarius" => "Adventure calls! It is a dentist appointment."
    | "capricorn"   => "Hustle culture is beckoning. Let it go to voicemail."
    | "aquarius"    => "Great idea. You will explain it twice. Then twice more."
    | "pisces"      => "You feel everything very deeply. Perhaps too deeply."
    | _             => "Unknown sign. The cosmos respectfully decline to comment."
  }
}

let signs = [
  "aries", "taurus", "libra", "scorpio", "aquarius", "pisces"
]

console.log("=== TODAY S COSMIC GUIDANCE ===")
console.log("Accuracy not guaranteed. Void where prohibited.")
console.log("")
for s in signs {
  console.log(to_upper(s) + ": " + daily_reading(s))
}`,

  coffee: `// Coffee Tax Pipeline — Pipeline Operator |>
// Your order goes in. Fees come out.

record Order {
  customer: string
  drink:    string
  size:     string
  price:    float
}

let orders = [
  Order("Alice",   "Oat Latte",   "large",  5.50),
  Order("Bob",     "Cold Brew",   "medium", 5.00),
  Order("Charlie", "Frappuccino", "large",  6.00),
  Order("Diana",   "Espresso",    "small",  3.00),
  Order("Eve",     "Decaf",       "large",  4.50),
]

let receipts =
  orders
    |> filter(o => o.drink != "Decaf")
    |> map(o => {
      let upcharge = match o.size {
        | "large"  => 0.75
        | "medium" => 0.25
        | _        => 0.0
      }
      let total = o.price + upcharge + 0.50
      { name: o.customer, drink: o.drink, total: total }
    })
    |> sort_by(r => r.total)

console.log("=== MORNING TAB ===")
console.log("(All orders include a $0.50 ambient fee. Non-negotiable.)")
console.log("(Decaf orders have been cancelled. You are welcome.)")
console.log("")
for r in receipts {
  console.log(pad_end(r.name, 10) + pad_end(r.drink, 16) + "$" + r.total)
}
let grand = sum_by(receipts, r => r.total)

  Recipe("Pasta Carbonara",    5,  25, 2),
  Recipe("Chicken Tikka",     14,  60, 3),
  Recipe("Beef Wellington",   12, 180, 5),
  Recipe("Ramen from Scratch",15, 360, 4),
  Recipe("Croissants",         6, 240, 5),
  Recipe("Toast",              1,   3, 1),
]

let ranked =
  cookbook
    |> filter(r => {
      let manageable = r.time_mins <= 200
      let not_trivial = r.skill >= 2
      manageable && not_trivial
    })
    |> map(r => {
      let effort = (r.ingredients * 2) + (r.time_mins / 10) + (r.skill * 5)
      let label  = match r.skill {
        | 1 => "beginner"
        | 2 => "easy"
        | 3 => "medium"
        | 4 => "hard"
        | _ => "chef"
      }
      { name: r.name, effort: effort, label: label }
    })
    |> sort_by(r => r.effort)

console.log("=== RECIPES BY EFFORT (max 200 min, skill 2+) ===")
for r in ranked {
  console.log(pad_end(r.name, 22) + pad_end("[" + r.label + "]", 12) + "effort: " + r.effort)
}`
}

// ── State ────────────────────────────────────────────────────────────────────
let compileTimer  = null
let lastJs        = null
let activeTab     = 'js'

// ── Init ─────────────────────────────────────────────────────────────────────
const editor    = document.getElementById('editor')
const editorHl  = document.getElementById('editor-hl')
const lineNums  = document.getElementById('line-nums')
const errorBar  = document.getElementById('error-bar')
const jsOutput  = document.getElementById('js-output')
const resultOut = document.getElementById('result-output')
const statusPill = document.getElementById('status-pill')
const lineCol   = document.getElementById('line-col')

function updateEditorHl() {
  // Trailing newline + space ensures the last empty line has proper height
  editorHl.innerHTML = highlightAxon(editor.value) + '\n '
}

// Load hello world on start
editor.value = EXAMPLES.hello
updateLineNums()
updateEditorHl()
compile()
runCode()

// ── Editor events ─────────────────────────────────────────────────────────────
editor.addEventListener('input', () => {
  updateLineNums()
  updateEditorHl()
  if (document.getElementById('auto-run').checked) scheduleCompile(600)
})
editor.addEventListener('scroll', () => {
  editorHl.scrollTop  = editor.scrollTop
  editorHl.scrollLeft = editor.scrollLeft
  syncScroll()
})
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault()
    const start = editor.selectionStart
    const end   = editor.selectionEnd
    editor.value = editor.value.slice(0, start) + '  ' + editor.value.slice(end)
    editor.selectionStart = editor.selectionEnd = start + 2
    updateLineNums()
    if (document.getElementById('auto-run').checked) scheduleCompile(600)
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault()
    runCode()
  }
})
editor.addEventListener('click', updateCursor)
editor.addEventListener('keyup', updateCursor)

// ── Line numbers ─────────────────────────────────────────────────────────────
function updateLineNums() {
  const lines = editor.value.split('\n')
  lineNums.textContent = lines.map((_, i) => i + 1).join('\n')
}

function syncScroll() {
  lineNums.scrollTop = editor.scrollTop
}

function updateCursor() {
  const val = editor.value
  const pos = editor.selectionStart
  const before = val.slice(0, pos)
  const line = (before.match(/\n/g) || []).length + 1
  const col  = pos - before.lastIndexOf('\n')
  lineCol.textContent = `line ${line}, col ${col}`
}

// ── Compile ───────────────────────────────────────────────────────────────────
function scheduleCompile(delay) {
  clearTimeout(compileTimer)
  compileTimer = setTimeout(compile, delay)
}

function compile() {
  const src = editor.value
  if (!src.trim()) {
    setStatus('idle', 'idle')
    errorBar.innerHTML = ''
    jsOutput.innerHTML = '<span style="color:var(--text-muted);font-style:italic">// transpiled JavaScript will appear here</span>'
    lastJs = null
    return
  }

  const { js, errors, warnings } = AxonCompiler.compile(src)
  lastJs = js

  // Render errors / warnings
  errorBar.innerHTML = ''
  if (errors.length > 0) {
    errors.forEach(e => {
      const div = document.createElement('div')
      div.className = 'error-item'
      div.innerHTML = `<span class="error-loc">[${e.line}:${e.col}]</span><span>${escHtml(e.message)}</span>`
      errorBar.appendChild(div)
    })
    setStatus('error', `${errors.length} error${errors.length > 1 ? 's' : ''}`)
    jsOutput.innerHTML = '<span style="color:var(--red);font-style:italic">// compile error — see details below</span>'
    return
  }
  if (warnings.length > 0) {
    warnings.forEach(w => {
      const div = document.createElement('div')
      div.className = 'error-item warn-item'
      div.innerHTML = `<span class="error-loc">[${w.line}:${w.col}]</span><span>${escHtml(w.message)}</span>`
      errorBar.appendChild(div)
    })
    setStatus('warn', `${warnings.length} warning${warnings.length > 1 ? 's' : ''}`)
  } else {
    setStatus('ok', 'ok')
  }

  // Render transpiled JS with basic highlighting
  jsOutput.innerHTML = highlightJs(js)
}

// ── Run ───────────────────────────────────────────────────────────────────────
function runCode() {
  if (!document.getElementById('auto-run').checked) compile()
  if (!lastJs) return

  switchTab('result')
  resultOut.innerHTML = ''

  const logs = []
  const fakeConsole = {
    log:   (...args) => logs.push({ type: 'log',   text: args.map(String).join(' ') }),
    warn:  (...args) => logs.push({ type: 'warn',  text: args.map(String).join(' ') }),
    error: (...args) => logs.push({ type: 'error', text: args.map(String).join(' ') }),
  }

  try {
    const fn = new Function('console', 'Math', 'JSON', 'Array', 'Object', 'Map', 'Set',
      'String', 'Number', 'Boolean', 'Promise', 'parseInt', 'parseFloat', 'isNaN',
      lastJs
    )
    const returnVal = fn(fakeConsole, Math, JSON, Array, Object, Map, Set,
      String, Number, Boolean, Promise, parseInt, parseFloat, isNaN
    )

    if (logs.length === 0 && returnVal !== undefined) {
      logs.push({ type: 'return', text: formatValue(returnVal) })
    }
  } catch (e) {
    logs.push({ type: 'error', text: String(e) })
  }

  if (logs.length === 0) {
    resultOut.innerHTML = '<div class="result-empty">Ran successfully — no output produced.</div>'
    return
  }

  logs.forEach(({ type, text }) => {
    const div = document.createElement('div')
    div.className = 'result-line'
    const prompt = type === 'error' ? '✗' : type === 'warn' ? '⚠' : type === 'return' ? '→' : '›'
    const cls    = type === 'error' ? 'result-error' : type === 'warn' ? 'result-error' : type === 'return' ? 'result-value' : 'result-log'
    div.innerHTML = `<span class="result-prompt">${prompt}</span><span class="${cls}">${escHtml(text)}</span>`
    resultOut.appendChild(div)
  })
}

// ── Format ────────────────────────────────────────────────────────────────────
function fmtCode() {
  const src = editor.value
  // Use the formatter from the browser bundle
  if (!window.AxonCompiler || !AxonCompiler.compile) return
  // Re-use: compile to check it's valid, then format using our inline formatter
  const { errors } = AxonCompiler.compile(src)
  if (errors.length > 0) return  // don't format broken code

  const formatted = formatAxon(src)
  if (formatted !== src) {
    const scrollTop = editor.scrollTop
    editor.value = formatted
    editor.scrollTop = scrollTop
    updateLineNums()
    updateEditorHl()
    scheduleCompile(0)
  }
}

// Simple inline formatter for the playground (normalizes whitespace)
function formatAxon(src) {
  return src
    .replace(/\r\n/g, '\n')
    .replace(/[ \t]+$/gm, '')   // trailing whitespace
    .replace(/\n{3,}/g, '\n\n') // max 1 blank line
    .trimEnd() + '\n'
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(id) {
  activeTab = id
  document.getElementById('pane-js').classList.toggle('hidden', id !== 'js')
  document.getElementById('pane-result').classList.toggle('hidden', id !== 'result')
  document.getElementById('tab-js').classList.toggle('active', id === 'js')
  document.getElementById('tab-result').classList.toggle('active', id === 'result')
}

function clearOutput() {
  resultOut.innerHTML = '<div class="result-empty">Run your code to see the result.</div>'
  switchTab('result')
}

// ── Examples ──────────────────────────────────────────────────────────────────
function loadExample(key) {
  if (!key || !EXAMPLES[key]) return
  editor.value = EXAMPLES[key]
  updateLineNums()
  updateEditorHl()
  compile()     // synchronous — ensures lastJs is fresh before runCode reads it
  runCode()     // auto-run so both panes reflect the new example immediately
  document.getElementById('example-select').value = ''
}

// ── Status pill ───────────────────────────────────────────────────────────────
function setStatus(type, text) {
  statusPill.className = `status-pill status-${type}`
  statusPill.textContent = text
}

// ── Axon source highlighter — single-pass tokeniser ──────────────────────────
function highlightAxon(src) {
  return escHtml(src).replace(
    /(\/\/[^\n]*)|("""[\s\S]*?"""|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)|(0x[\da-fA-F_]+|0b[01_]+|\b\d[\d_]*\.?[\d_]*)|(@\w+)|(\|>|=>|->|\?\?|::|[|](?![|>]))|\b(fn|let|mut|type|record|enum|match|if|else|for|in|while|break|continue|where|return|import|export|from|module|store|interface|async|await|and|or|not|infer)\b|\b(true|false|null|undefined)\b|\b(string|int|float|bool|void)\b/g,
    (_, cmt, str, num, ann, op, kw, bool, ty) => {
      if (cmt)  return `<span class="cmt">${cmt}</span>`
      if (str)  return `<span class="str">${str}</span>`
      if (num)  return `<span class="num">${num}</span>`
      if (ann)  return `<span class="ann">${ann}</span>`
      if (op)   return `<span class="op">${op}</span>`
      if (kw)   return `<span class="kw">${kw}</span>`
      if (bool) return `<span class="bool">${bool}</span>`
      if (ty)   return `<span class="ty">${ty}</span>`
      return _
    }
  )
}

// ── JS highlighter — single-pass so span class names are never re-matched ────
function highlightJs(code) {
  return escHtml(code).replace(
    /(\/\/[^\n]*)|(`(?:[^`\\]|\\.)*`|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')|(0x[\da-fA-F]+|\d+\.?\d*)|(\b(?:const|let|var|function|return|if|else|for|while|of|in|async|await|new|class|import|export|typeof|void|null|undefined|true|false)\b)/g,
    (_, cmt, str, num, kw) => {
      if (cmt) return `<span class="cmt">${cmt}</span>`
      if (str) return `<span class="str">${str}</span>`
      if (num) return `<span class="num">${num}</span>`
      if (kw)  return `<span class="kw">${kw}</span>`
      return _
    }
  )
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
}

function formatValue(v) {
  if (typeof v === 'string')   return JSON.stringify(v)
  if (typeof v === 'function') return '[Function]'
  if (Array.isArray(v))        return '[' + v.map(formatValue).join(', ') + ']'
  if (v && typeof v === 'object') return JSON.stringify(v)
  return String(v)
}

// ── Drag-to-resize split divider ─────────────────────────────────────────────
;(function () {
  const divider    = document.getElementById('split-divider')
  const splitPane  = document.querySelector('.split-pane')
  const editorPane = document.querySelector('.editor-pane')
  const outputPane = document.querySelector('.output-pane')
  let dragging = false

  divider.addEventListener('mousedown', e => {
    e.preventDefault()
    dragging = true
    divider.classList.add('dragging')
    document.body.style.cursor = window.innerWidth <= 768 ? 'row-resize' : 'col-resize'
    document.body.style.userSelect = 'none'
  })

  document.addEventListener('mousemove', e => {
    if (!dragging) return
    const rect  = splitPane.getBoundingClientRect()
    const isMobile = window.innerWidth <= 768

    if (isMobile) {
      const pct = Math.max(20, Math.min(80,
        (e.clientY - rect.top) / rect.height * 100))
      editorPane.style.flex = `0 0 ${pct}%`
      outputPane.style.flex = '1 1 0'
    } else {
      const pct = Math.max(20, Math.min(80,
        (e.clientX - rect.left) / rect.width * 100))
      editorPane.style.flex = `0 0 ${pct}%`
      outputPane.style.flex = '1 1 0'
    }
  })

  const stopDrag = () => {
    if (!dragging) return
    dragging = false
    divider.classList.remove('dragging')
    document.body.style.cursor = ''
    document.body.style.userSelect = ''
  }
  document.addEventListener('mouseup',    stopDrag)
  document.addEventListener('mouseleave', stopDrag)

  // Touch support for mobile
  divider.addEventListener('touchstart', e => {
    e.preventDefault()
    dragging = true
    divider.classList.add('dragging')
  }, { passive: false })

  divider.addEventListener('touchmove', e => {
    if (!dragging) return
    e.preventDefault()
    const touch = e.touches[0]
    const rect  = splitPane.getBoundingClientRect()
    const pct   = Math.max(20, Math.min(80,
      (touch.clientY - rect.top) / rect.height * 100))
    editorPane.style.flex = `0 0 ${pct}%`
    outputPane.style.flex = '1 1 0'
  }, { passive: false })

  divider.addEventListener('touchend', () => {
    dragging = false
    divider.classList.remove('dragging')
  })
})()
</script>
