<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synth Fantasy — Classic Turn Battle</title>
<style>
  :root {
    --bg: #07071a;
    --surf: #101028;
    --pink: #ff2d78;
    --cyan: #00e5ff;
    --purple: #b84fff;
    --gold: #ffd166;
    --green: #06d6a0;
    --text: #e8e0ff;
    --muted: #6a6490;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(184,79,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
    background-size: 36px 36px; pointer-events: none; z-index: 0;
  }
  .wrap {
    position: relative; z-index: 1; width: 100%; max-width: 840px;
    padding: 16px 20px 24px; display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .hdr {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 10px; border-bottom: 1px solid #1e1e3a;
  }
  .logo { font-size: 1rem; font-weight: bold; letter-spacing: .18em; color: var(--gold); text-shadow: 0 0 12px #ffd16666; }
  .logo span { color: var(--pink); text-shadow: 0 0 12px #ff2d7899; }
  .hdr-right { font-size: .62rem; color: var(--muted); letter-spacing: .08em; text-align: right; line-height: 1.5; }
  .hdr-right a { color: var(--cyan); text-decoration: none; }
  .canvas-wrap {
    position: relative; width: 100%; max-width: 800px; aspect-ratio: 800 / 520;
    border: 1px solid #2a2a4a; border-radius: 8px; overflow: hidden;
    box-shadow: 0 0 40px #b84fff22, 0 0 80px #00e5ff11;
  }
  .canvas-wrap::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.05) 3px, rgba(0,0,0,.05) 4px);
    pointer-events: none; z-index: 2;
  }
  canvas { display: block; width: 100%; height: 100%; cursor: pointer; }
  .controls-hint {
    font-size: .68rem; color: var(--muted); text-align: center; line-height: 1.5;
  }
  .controls-hint a { color: var(--cyan); text-decoration: none; }
</style>
<link rel="stylesheet" href="game-mobile.css">
<link rel="stylesheet" href="site-footer.css">
</head>
<body>
<div class="wrap">
  <header class="hdr">
    <div class="logo">SYNTH<span>FANTASY</span></div>
    <div class="hdr-right">
      Classic FF turn battle · Built with <a href="landing.html">Synth</a><br>
      <a href="https://github.com/synth-pl/synth" target="_blank">github.com/synth-pl/synth</a>
    </div>
  </header>
  <div class="canvas-wrap">
    <canvas id="c" width="800" height="520"></canvas>
  </div>
  <div class="controls-hint">
    ↑↓ / W S select · Z / Enter confirm · X / Esc cancel · Tap menu rows on mobile<br>
    Sequel to <a href="rpg.standalone.html">RPG Adventure</a> — Aria · Theron · Lyra
  </div>
</div>

<footer class="site-footer">
  <div class="footer-logo">⬡ Synth</div>
  <div class="footer-links">
    <a class="footer-link" href="docs.html">Docs</a>
    <a class="footer-link" href="https://github.com/synth-pl/synth">GitHub</a>
    <a class="footer-link" href="https://github.com/synth-pl/synth/issues">Issues</a>
    <a class="footer-link" href="https://www.npmjs.com/package/synth-lang">npm</a>
  </div>
  <div class="footer-copy">MIT License · © 2026 synth-pl</div>
</footer>

<script src="synth.stdlib.js"></script>
<script src="rpg2.sources.js"></script>
<script>
const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')
const W = 800, H = 520

function roundRect(x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2)
  ctx.beginPath()
  ctx.moveTo(x + rr, y)
  ctx.arcTo(x + w, y, x + w, y + h, rr)
  ctx.arcTo(x + w, y + h, x, y + h, rr)
  ctx.arcTo(x, y + h, x, y, rr)
  ctx.arcTo(x, y, x + w, y, rr)
  ctx.closePath()
}

function drawPanel(x, y, w, h, fill, stroke) {
  ctx.fillStyle = fill
  roundRect(x, y, w, h, 8)
  ctx.fill()
  ctx.strokeStyle = stroke
  ctx.lineWidth = 1.5
  roundRect(x, y, w, h, 8)
  ctx.stroke()
}

function drawBar(x, y, w, h, ratio, color) {
  ctx.fillStyle = '#1a1430'
  roundRect(x, y, w, h, 3)
  ctx.fill()
  const rw = Math.max(0, Math.min(1, ratio)) * w
  if (rw > 0) {
    ctx.fillStyle = color
    roundRect(x, y, rw, h, 3)
    ctx.fill()
  }
}

function drawSilhouette(x, y, w, h, color, kind) {
  ctx.save()
  ctx.shadowColor = color
  ctx.shadowBlur = 4
  ctx.globalAlpha = 0.85
  ctx.fillStyle = color
  if (kind === 'knight') {
    ctx.fillRect(x + w * 0.3, y + h * 0.25, w * 0.4, h * 0.55)
    ctx.beginPath()
    ctx.moveTo(x + w * 0.5, y)
    ctx.lineTo(x + w * 0.85, y + h * 0.28)
    ctx.lineTo(x + w * 0.15, y + h * 0.28)
    ctx.closePath()
    ctx.fill()
  } else if (kind === 'mage') {
    ctx.beginPath()
    ctx.moveTo(x + w * 0.5, y)
    ctx.lineTo(x + w, y + h * 0.85)
    ctx.lineTo(x, y + h * 0.85)
    ctx.closePath()
    ctx.fill()
  } else if (kind === 'ranger') {
    ctx.fillRect(x + w * 0.35, y + h * 0.15, w * 0.3, h * 0.7)
    ctx.fillRect(x + w * 0.1, y + h * 0.35, w * 0.8, h * 0.12)
  } else if (kind === 'boss') {
    ctx.beginPath()
    ctx.ellipse(x + w / 2, y + h * 0.55, w * 0.45, h * 0.4, 0, 0, Math.PI * 2)
    ctx.fill()
    ctx.beginPath()
    ctx.moveTo(x + w * 0.2, y + h * 0.35)
    ctx.lineTo(x + w * 0.35, y)
    ctx.lineTo(x + w * 0.5, y + h * 0.3)
    ctx.fill()
    ctx.beginPath()
    ctx.moveTo(x + w * 0.8, y + h * 0.35)
    ctx.lineTo(x + w * 0.65, y)
    ctx.lineTo(x + w * 0.5, y + h * 0.3)
    ctx.fill()
  } else {
    ctx.beginPath()
    ctx.ellipse(x + w / 2, y + h * 0.55, w * 0.4, h * 0.38, 0, 0, Math.PI * 2)
    ctx.fill()
    ctx.fillRect(x + w * 0.35, y + h * 0.1, w * 0.3, h * 0.35)
  }
  ctx.restore()
  ctx.shadowBlur = 0
  ctx.globalAlpha = 1
}

function foeKind(id) {
  if (id === 'wyrm') return 'boss'
  return 'foe'
}

function heroKind(cls) {
  if (cls === 'knight') return 'knight'
  if (cls === 'mage') return 'mage'
  return 'ranger'
}

function drawTitle(view) {
  ctx.fillStyle = '#07071a'
  ctx.fillRect(0, 0, W, H)
  const g = ctx.createLinearGradient(0, 0, W, H)
  g.addColorStop(0, 'rgba(184,79,255,0.25)')
  g.addColorStop(0.5, 'rgba(0,229,255,0.08)')
  g.addColorStop(1, 'rgba(255,45,120,0.2)')
  ctx.fillStyle = g
  ctx.fillRect(0, 0, W, H)

  ctx.fillStyle = '#ffd166'
  ctx.font = 'bold 42px Courier New'
  ctx.textAlign = 'center'
  ctx.shadowColor = '#ffd166'
  ctx.shadowBlur = 18
  ctx.fillText('SYNTH FANTASY', W / 2, 180)
  ctx.shadowBlur = 0
  ctx.fillStyle = '#e8e0ff'
  ctx.font = '16px Courier New'
  ctx.fillText('A classic turn-based battle — Aria · Theron · Lyra', W / 2, 220)
  ctx.fillStyle = '#00e5ff'
  ctx.font = '14px Courier New'
  ctx.fillText(view.hint || 'Press Z / Enter to start', W / 2, 320)
  ctx.fillStyle = '#6a6490'
  ctx.font = '12px Courier New'
  ctx.fillText('Vertical slice sequel to RPG Adventure', W / 2, 360)
}

function drawEnd(view, title, color) {
  ctx.fillStyle = '#07071a'
  ctx.fillRect(0, 0, W, H)
  ctx.fillStyle = color
  ctx.font = 'bold 40px Courier New'
  ctx.textAlign = 'center'
  ctx.shadowColor = color
  ctx.shadowBlur = 20
  ctx.fillText(title, W / 2, 220)
  ctx.shadowBlur = 0
  ctx.fillStyle = '#e8e0ff'
  ctx.font = '14px Courier New'
  ctx.fillText(view.hint || '', W / 2, 280)
}

function drawBattle(view, dt) {
  const HUD_Y = 402
  const HUD_H = 110
  const FIELD_BOTTOM = HUD_Y - 8

  // Quiet field
  const sky = ctx.createLinearGradient(0, 0, 0, FIELD_BOTTOM)
  sky.addColorStop(0, '#0b0a16')
  sky.addColorStop(0.7, '#12101f')
  sky.addColorStop(1, '#161225')
  ctx.fillStyle = sky
  ctx.fillRect(0, 0, W, FIELD_BOTTOM)

  // Soft floor wash
  const floor = ctx.createLinearGradient(0, 240, 0, FIELD_BOTTOM)
  floor.addColorStop(0, 'transparent')
  floor.addColorStop(1, 'rgba(0,0,0,0.35)')
  ctx.fillStyle = floor
  ctx.fillRect(0, 240, W, FIELD_BOTTOM - 240)

  // Quiet encounter label
  ctx.fillStyle = 'rgba(200,190,230,0.45)'
  ctx.font = '11px Courier New'
  ctx.textAlign = 'left'
  ctx.fillText(view.title || '', 18, 22)

  const anim = view.anim || { kind: 'none', timer: 0 }
  const shake = anim.kind !== 'none' && anim.timer > 0.35 ? Math.sin(anim.timer * 40) * 2 : 0

  // Enemies — mid-left, smaller
  const foes = view.foes || []
  foes.forEach((e, i) => {
    if (!e.alive && !(anim.side === 'hero' && anim.target === i && anim.timer > 0)) return
    const x = 90 + (i % 2) * 90 + shake
    const y = 150 + Math.floor(i / 2) * 78
    const alpha = e.alive ? 0.9 : 0.28
    ctx.globalAlpha = alpha
    const flash = anim.kind !== 'none' && anim.side === 'hero' && anim.target === i && anim.timer > 0.2
    drawSilhouette(x, y, 52, 64, flash ? '#d8d0e8' : e.color, foeKind(e.id))
    ctx.globalAlpha = 1
    ctx.fillStyle = 'rgba(210,200,235,0.7)'
    ctx.font = '10px Courier New'
    ctx.textAlign = 'center'
    ctx.fillText(e.name, x + 26, y + 76)
    drawBar(x + 2, y + 80, 48, 4, e.maxHp ? e.hp / e.maxHp : 0, 'rgba(255,80,100,0.75)')
    if (anim.kind !== 'none' && anim.side === 'hero' && anim.target === i && anim.amount > 0 && anim.timer > 0.05) {
      ctx.fillStyle = 'rgba(255,220,140,0.9)'
      ctx.font = '12px Courier New'
      ctx.fillText('-' + anim.amount, x + 26, y - 4 + (0.55 - anim.timer) * 22)
    }
  })

  // Party — mid-right, smaller, no loud active frame
  const party = view.party || []
  party.forEach((h, i) => {
    const x = 640 + shake * -0.4
    const y = 130 + i * 72
    const active = view.phase !== 'enemy_act' && view.phase !== 'resolve' && view.phase !== 'battle_clear' && view.active === i
    ctx.globalAlpha = h.alive ? (active ? 0.95 : 0.7) : 0.25
    const flash = anim.kind !== 'none' && anim.side === 'enemy' && anim.target === i && anim.timer > 0.2
    drawSilhouette(x, y, 48, 52, flash ? '#d8d0e8' : h.color, heroKind(h.heroClass))
    ctx.globalAlpha = 1
    if (active) {
      ctx.fillStyle = 'rgba(255,209,102,0.55)'
      ctx.font = '9px Courier New'
      ctx.textAlign = 'center'
      ctx.fillText('▼', x + 24, y - 2)
    }
    if (h.defending) {
      ctx.fillStyle = 'rgba(120,200,220,0.6)'
      ctx.font = '9px Courier New'
      ctx.textAlign = 'center'
      ctx.fillText('guard', x + 24, y + 60)
    }
    if (anim.kind !== 'none' && anim.side === 'enemy' && anim.target === i && anim.amount > 0 && anim.timer > 0.05) {
      ctx.fillStyle = 'rgba(255,120,130,0.9)'
      ctx.font = '12px Courier New'
      ctx.textAlign = 'center'
      ctx.fillText('-' + anim.amount, x + 24, y - 6 + (0.55 - anim.timer) * 22)
    }
    if ((anim.kind === 'heal' || anim.kind === 'item') && anim.target === i && anim.amount > 0 && anim.timer > 0.05) {
      ctx.fillStyle = 'rgba(100,210,160,0.9)'
      ctx.font = '12px Courier New'
      ctx.textAlign = 'center'
      ctx.fillText('+' + anim.amount, x + 24, y - 6)
    }
  })

  // One-line log above HUD
  const logs = view.logs || []
  ctx.fillStyle = 'rgba(180,170,210,0.55)'
  ctx.font = '11px Courier New'
  ctx.textAlign = 'left'
  ctx.fillText(logs[0] || '', 18, HUD_Y - 12)

  // Bottom HUD — single quiet strip
  ctx.fillStyle = 'rgba(8,7,16,0.82)'
  ctx.fillRect(0, HUD_Y, W, HUD_H)
  ctx.strokeStyle = 'rgba(140,130,180,0.2)'
  ctx.beginPath()
  ctx.moveTo(0, HUD_Y + 0.5)
  ctx.lineTo(W, HUD_Y + 0.5)
  ctx.stroke()

  // Command column
  const modeLabel = view.menu_mode === 'command' ? 'Command' :
    view.menu_mode === 'magic' ? 'Magic' :
    view.menu_mode === 'skill' ? 'Skill' :
    view.menu_mode === 'item' ? 'Item' :
    view.menu_mode === 'target_enemy' ? 'Target' :
    view.menu_mode === 'target_ally' ? 'Ally' : String(view.menu_mode || '')
  const actor = party[view.active]
  const actorName = actor ? actor.name : ''
  ctx.fillStyle = 'rgba(170,160,200,0.55)'
  ctx.font = '11px Courier New'
  ctx.textAlign = 'left'
  ctx.fillText(modeLabel + (actorName ? ' · ' + actorName : ''), 18, HUD_Y + 18)

  const menu = view.menu || []
  const canPick = view.phase === 'hero_command' || view.phase === 'hero_pick'
  const nowMs = performance.now()
  const menuTop = HUD_Y + 28
  const rowH = 18
  menu.forEach((row, i) => {
    const yy = menuTop + i * rowH
    const selected = canPick && i === view.menu_index
    const flashed = canPick && i === flashIdx && nowMs < flashUntil
    if (flashed) {
      ctx.fillStyle = 'rgba(255,209,102,0.2)'
      ctx.fillRect(14, yy - 11, 200, 16)
      ctx.fillStyle = 'rgba(255,220,150,0.95)'
      ctx.fillText('▸ ' + row.label, 20, yy)
    } else if (selected) {
      ctx.fillStyle = 'rgba(160,150,210,0.14)'
      ctx.fillRect(14, yy - 11, 200, 16)
      ctx.fillStyle = 'rgba(210,200,240,0.95)'
      ctx.fillText('▸ ' + row.label, 20, yy)
    } else {
      ctx.fillStyle = 'rgba(160,155,185,0.7)'
      ctx.fillText('  ' + row.label, 20, yy)
    }
  })
  if (!canPick) {
    ctx.fillStyle = 'rgba(130,125,160,0.65)'
    ctx.font = '11px Courier New'
    ctx.fillText(view.phase === 'resolve' ? '…' :
      view.phase === 'enemy_act' ? 'Enemy turn' :
      view.phase === 'battle_clear' ? 'Victory — confirm to continue' : view.phase, 20, HUD_Y + 88)
  }

  // Party stats — compact right
  party.forEach((h, i) => {
    const yy = HUD_Y + 18 + i * 30
    const active = view.active === i && canPick
    ctx.fillStyle = h.alive ? (active ? 'rgba(230,220,255,0.9)' : 'rgba(180,170,205,0.65)') : 'rgba(100,95,120,0.5)'
    ctx.font = '11px Courier New'
    ctx.textAlign = 'left'
    ctx.fillText(h.name, 250, yy)
    ctx.fillStyle = 'rgba(130,125,155,0.55)'
    ctx.fillText(h.heroClass, 320, yy)
    drawBar(390, yy - 7, 140, 5, h.maxHp ? h.hp / h.maxHp : 0, 'rgba(200,70,90,0.65)')
    ctx.fillStyle = 'rgba(170,165,195,0.55)'
    ctx.font = '10px Courier New'
    ctx.fillText(h.hp + '/' + h.maxHp, 538, yy)
    drawBar(600, yy - 7, 90, 5, h.maxMp ? h.mp / h.maxMp : 0, 'rgba(80,160,190,0.55)')
    ctx.fillStyle = 'rgba(170,165,195,0.5)'
    ctx.fillText(h.mp + '/' + h.maxMp, 698, yy)
  })

  ctx.fillStyle = 'rgba(130,125,160,0.45)'
  ctx.font = '10px Courier New'
  ctx.textAlign = 'right'
  ctx.fillText('potions ×' + (view.potions ?? 0), W - 16, HUD_Y + 102)
}

// Menu geometry for click hit-testing (kept in sync with drawBattle HUD)
const MENU_HIT = { x0: 14, x1: 220, y0: 419, rowH: 18 }

function draw(dt) {
  const view = get_view()
  if (view.scene === 'title') drawTitle(view)
  else if (view.scene === 'victory') drawEnd(view, 'VICTORY', '#06d6a0')
  else if (view.scene === 'gameover') drawEnd(view, 'GAME OVER', '#ff2d78')
  else drawBattle(view, dt)
}

let flashIdx = -1
let flashUntil = 0
let confirmAt = 0

function onConfirm() { menu_confirm() }
function onCancel() { menu_cancel() }
function onUp() { menu_move(-1) }
function onDown() { menu_move(1) }

document.addEventListener('keydown', e => {
  if (confirmAt) return
  if (e.code === 'ArrowUp' || e.code === 'KeyW') { e.preventDefault(); onUp() }
  else if (e.code === 'ArrowDown' || e.code === 'KeyS') { e.preventDefault(); onDown() }
  else if (e.code === 'Enter' || e.code === 'KeyZ' || e.code === 'Space') { e.preventDefault(); onConfirm() }
  else if (e.code === 'Escape' || e.code === 'KeyX' || e.code === 'Backspace') { e.preventDefault(); onCancel() }
})

canvas.addEventListener('click', e => {
  if (confirmAt) return
  const view = get_view()
  if (view.scene !== 'battle') { onConfirm(); return }
  if (view.phase === 'battle_clear') { onConfirm(); return }
  if (view.phase !== 'hero_command' && view.phase !== 'hero_pick') return

  const rect = canvas.getBoundingClientRect()
  const x = (e.clientX - rect.left) * W / rect.width
  const y = (e.clientY - rect.top) * H / rect.height
  const menu = view.menu || []
  if (x >= MENU_HIT.x0 && x <= MENU_HIT.x1 && y >= MENU_HIT.y0) {
    const idx = Math.floor((y - MENU_HIT.y0) / MENU_HIT.rowH)
    if (idx >= 0 && idx < menu.length) {
      menu_set_index(idx)
      flashIdx = idx
      flashUntil = performance.now() + 160
      confirmAt = performance.now() + 160
    }
  }
})

let prev = performance.now()
function loop(now) {
  const dt = Math.min((now - prev) / 1000, 0.05)
  prev = now
  if (confirmAt && now >= confirmAt) {
    confirmAt = 0
    menu_confirm()
  }
  tick(dt)
  draw(dt)
  requestAnimationFrame(loop)
}
requestAnimationFrame(loop)
</script>
</body>
</html>
