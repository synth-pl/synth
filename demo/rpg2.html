<script>
const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')
const W = 800, H = 520

function roundRect(x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2)
  ctx.beginPath()
  ctx.moveTo(x + rr, y)
  ctx.arcTo(x + w, y, x + w, y + h, rr)
  ctx.arcTo(x + w, y + h, x, y + h, rr)
  ctx.arcTo(x, y + h, x, y, rr)
  ctx.arcTo(x, y, x + w, y, rr)
  ctx.closePath()
}

function drawPanel(x, y, w, h, fill, stroke) {
  ctx.fillStyle = fill
  roundRect(x, y, w, h, 8)
  ctx.fill()
  ctx.strokeStyle = stroke
  ctx.lineWidth = 1.5
  roundRect(x, y, w, h, 8)
  ctx.stroke()
}

function drawBar(x, y, w, h, ratio, color) {
  ctx.fillStyle = '#1a1430'
  roundRect(x, y, w, h, 3)
  ctx.fill()
  const rw = Math.max(0, Math.min(1, ratio)) * w
  if (rw > 0) {
    ctx.fillStyle = color
    roundRect(x, y, rw, h, 3)
    ctx.fill()
  }
}

// ── Party sprites / portraits / battle backgrounds ───────────────────────────
const ASSET_BASE = 'assets/rpg2/'
let partyMeta = null
let spritesReady = false
const heroSheets = {}   // id -> keyed canvas
const heroPortraits = {} // id -> Image
const battleBgs = {}     // filename -> Image
const heroAnim = {}      // id -> { name, frame, timer, oneShot }

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image()
    img.onload = () => resolve(img)
    img.onerror = () => reject(new Error('failed to load ' + src))
    img.src = src
  })
}

function chromaKeyToCanvas(img, chroma) {
  const c = document.createElement('canvas')
  c.width = img.naturalWidth || img.width
  c.height = img.naturalHeight || img.height
  const cctx = c.getContext('2d')
  cctx.drawImage(img, 0, 0)
  const data = cctx.getImageData(0, 0, c.width, c.height)
  const d = data.data
  const kr = chroma.r, kg = chroma.g, kb = chroma.b
  const tol = chroma.tolerance != null ? chroma.tolerance : 90
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i + 1], b = d[i + 2]
    // Magenta-ish key (art uses ~240,4,218 not pure FF00FF)
    const magenta = r > 200 && b > 180 && g < 90
    const dist = Math.abs(r - kr) + Math.abs(g - kg) + Math.abs(b - kb)
    if (magenta || dist < tol) d[i + 3] = 0
  }
  cctx.putImageData(data, 0, 0)
  return c
}

async function loadPartyAssets() {
  try {
    const res = await fetch(ASSET_BASE + 'party.json')
    partyMeta = await res.json()
    const chroma = partyMeta.chroma || { r: 240, g: 4, b: 218, tolerance: 90 }
    const heroes = partyMeta.heroes || {}
    await Promise.all(Object.keys(heroes).map(async id => {
      const h = heroes[id]
      const sheet = await loadImage(ASSET_BASE + h.sheet)
      heroSheets[id] = chromaKeyToCanvas(sheet, chroma)
      if (h.portrait) {
        heroPortraits[id] = await loadImage(ASSET_BASE + h.portrait)
      }
      heroAnim[id] = { name: 'idle', frame: 0, timer: 0, oneShot: false }
    }))
    const bgs = partyMeta.backgrounds || {}
    await Promise.all(Object.keys(bgs).map(async k => {
      const file = bgs[k]
      if (!battleBgs[file]) battleBgs[file] = await loadImage(ASSET_BASE + file)
    }))
    spritesReady = true
  } catch (err) {
    console.warn('rpg2 assets:', err)
    spritesReady = false
  }
}

function heroSpriteId(h) {
  if (!h) return null
  if (h.id && partyMeta && partyMeta.heroes[h.id]) return h.id
  const cls = h.heroClass
  if (cls === 'knight') return 'theron'
  if (cls === 'mage') return 'aria'
  if (cls === 'ranger') return 'lyra'
  return h.id || null
}

function pickHeroAnimName(h, i, view) {
  if (!h.alive) return 'down'
  const anim = view.anim || { kind: 'none' }
  if (anim.kind && anim.kind !== 'none' && anim.timer > 0) {
    if (anim.side === 'enemy' && anim.target === i) return 'hit'
    if (anim.side === 'hero' && anim.actor === i) {
      if (anim.kind === 'magic' || anim.kind === 'heal') return 'cast'
      if (anim.kind === 'skill') return 'cast'
      if (anim.kind === 'attack' || anim.kind === 'item' || anim.kind === 'defend' || anim.kind === 'guard') {
        return anim.kind === 'defend' || anim.kind === 'guard' ? 'defend' : 'attack'
      }
      return 'attack'
    }
  }
  if (h.defending) return 'defend'
  return 'idle'
}

function syncHeroAnims(view, dt) {
  if (!spritesReady || !partyMeta) return
  const party = view.party || []
  party.forEach((h, i) => {
    const id = heroSpriteId(h)
    if (!id || !partyMeta.heroes[id]) return
    const want = pickHeroAnimName(h, i, view)
    let st = heroAnim[id]
    if (!st) { st = heroAnim[id] = { name: 'idle', frame: 0, timer: 0, oneShot: false } }
    const def = partyMeta.heroes[id].anims[want] || partyMeta.heroes[id].anims.idle
    const n = (def.frames && def.frames.length) || 1
    if (st.name !== want) {
      st.name = want
      st.frame = 0
      st.timer = 0
      st.oneShot = !def.loop
    }
    const fps = def.fps || 8
    st.timer += dt
    const frameDur = 1 / fps
    while (st.timer >= frameDur) {
      st.timer -= frameDur
      if (st.oneShot) {
        if (st.frame < n - 1) st.frame++
      } else {
        st.frame = (st.frame + 1) % n
      }
    }
  })
}

function drawHeroSprite(h, i, x, y, drawW, drawH, flash) {
  const id = heroSpriteId(h)
  if (!spritesReady || !id || !heroSheets[id] || !partyMeta.heroes[id]) {
    ctx.strokeStyle = h.color || '#e8e0ff'
    ctx.lineWidth = 2
    ctx.strokeRect(x + 8, y + 8, drawW - 16, drawH - 16)
    return
  }
  const meta = partyMeta.heroes[id]
  const st = heroAnim[id] || { name: 'idle', frame: 0 }
  const anim = meta.anims[st.name] || meta.anims.idle
  const boxes = anim.frames || []
  const box = boxes[Math.min(st.frame, boxes.length - 1)]
  if (!box) return
  const sheet = heroSheets[id]
  // Contain frame in draw box (sheets are irregular cell sizes)
  const scale = Math.min(drawW / box.w, drawH / box.h)
  const dw = box.w * scale
  const dh = box.h * scale
  const ox = (drawW - dw) / 2
  const oy = drawH - dh // feet on the bottom of the slot
  ctx.save()
  if (flash) ctx.globalAlpha = Math.min(ctx.globalAlpha, 1) * 0.85
  // Flip horizontally — sheets face right, party should face foes (left)
  ctx.translate(x + drawW, y)
  ctx.scale(-1, 1)
  ctx.drawImage(sheet, box.x, box.y, box.w, box.h, ox, oy, dw, dh)
  ctx.restore()
}

function drawBattleBackground(encounter) {
  const file = partyMeta && partyMeta.backgrounds
    ? partyMeta.backgrounds[String(encounter)] || partyMeta.backgrounds['0']
    : null
  const img = file ? battleBgs[file] : null
  if (img) {
    // Cover field area above HUD
    const fieldH = 308
    const iw = img.naturalWidth || img.width
    const ih = img.naturalHeight || img.height
    const scale = Math.max(W / iw, fieldH / ih)
    const dw = iw * scale
    const dh = ih * scale
    const dx = (W - dw) / 2
    const dy = (fieldH - dh) / 2
    ctx.drawImage(img, dx, dy, dw, dh)
    // Soft vignette into HUD
    const g = ctx.createLinearGradient(0, fieldH - 40, 0, fieldH)
    g.addColorStop(0, 'rgba(7,7,26,0)')
    g.addColorStop(1, 'rgba(7,7,26,0.85)')
    ctx.fillStyle = g
    ctx.fillRect(0, fieldH - 40, W, 40)
  } else {
    const sky = ctx.createLinearGradient(0, 0, 0, H)
    sky.addColorStop(0, '#12082a')
    sky.addColorStop(0.55, '#1a0f38')
    sky.addColorStop(1, '#0a0618')
    ctx.fillStyle = sky
    ctx.fillRect(0, 0, W, H)
    ctx.fillStyle = '#16102e'
    ctx.fillRect(0, 300, W, 220)
  }
}

function drawPortrait(id, x, y, size, alive) {
  const img = heroPortraits[id]
  ctx.save()
  roundRect(x, y, size, size, 4)
  ctx.clip()
  if (img) {
    ctx.globalAlpha = alive ? 1 : 0.4
    ctx.drawImage(img, x, y, size, size)
  } else {
    ctx.fillStyle = '#1a1430'
    ctx.fillRect(x, y, size, size)
  }
  ctx.restore()
  ctx.strokeStyle = 'rgba(0,229,255,0.45)'
  ctx.lineWidth = 1
  roundRect(x, y, size, size, 4)
  ctx.stroke()
}


// ── Strike particles (sword / bow / magic) ────────────────────────────────────
let particles = []
let fxBeams = []
let lastFxKey = ''

function foeAnchor(i) {
  return { x: 80 + (i % 2) * 110 + 35, y: 95 + Math.floor(i / 2) * 88 + 42 }
}
function heroAnchor(i) {
  return { x: 650, y: 70 + i * 78 + 45 }
}

function pushSpark(x, y, vx, vy, life, size, color, shape) {
  particles.push({ x, y, vx, vy, life, max: life, size, color, shape: shape || 'dot' })
}

function burstAt(cx, cy, n, colors, speed, shape) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2
    const s = speed * (0.35 + Math.random() * 0.9)
    pushSpark(cx, cy, Math.cos(a) * s, Math.sin(a) * s,
      0.22 + Math.random() * 0.35,
      1.5 + Math.random() * 3.5,
      colors[i % colors.length],
      shape)
  }
}

function spawnStrikeFx(anim, party, foes) {
  const kind = anim.kind
  if (kind !== 'attack' && kind !== 'magic' && kind !== 'skill') return
  const actor = Math.max(0, anim.actor | 0)
  const target = Math.max(0, anim.target | 0)
  const from = anim.side === 'enemy' ? foeAnchor(actor) : heroAnchor(actor)
  const to = anim.side === 'enemy' ? heroAnchor(target) : foeAnchor(target)
  const text = String(anim.text || '')

  if (kind === 'attack') {
    // Sword: slash arc + steel / gold sparks at impact
    fxBeams.push({
      style: 'slash', x0: from.x - 30, y0: from.y - 10, x1: to.x + 10, y1: to.y,
      life: 0.28, max: 0.28, color: '#ffd166'
    })
    burstAt(to.x, to.y, 14, ['#ffd166', '#ffffff', '#ff9f43', '#e8e0ff'], 140, 'slash')
    burstAt(to.x, to.y, 6, ['#ffffff', '#ffd166'], 60, 'dot')
  } else if (kind === 'skill') {
    // Bow: arrow streak(s) + green feather sparks
    const rain = /rain/i.test(text)
    const targets = rain
      ? foes.map((e, i) => e && e.alive !== false ? i : -1).filter(i => i >= 0)
      : [target]
    if (targets.length === 0) targets.push(target)
    targets.forEach((ti, n) => {
      const hit = foeAnchor(ti)
      const delay = n * 0.04
      fxBeams.push({
        style: 'arrow', x0: from.x - 20, y0: from.y, x1: hit.x, y1: hit.y,
        life: 0.32, max: 0.32, color: '#06d6a0', delay
      })
      burstAt(hit.x, hit.y, 10, ['#06d6a0', '#7CFC9A', '#e8ffe8', '#00e5ff'], 120, 'feather')
    })
  } else if (kind === 'magic') {
    // Magic: bolt beam + arcane orb burst
    const fire = /fire/i.test(text)
    const colors = fire
      ? ['#ff2d78', '#ff9f43', '#ffd166', '#b84fff']
      : ['#b84fff', '#00e5ff', '#ff2d78', '#e8e0ff']
    fxBeams.push({
      style: 'bolt', x0: from.x - 20, y0: from.y, x1: to.x, y1: to.y,
      life: 0.36, max: 0.36, color: colors[0]
    })
    burstAt(to.x, to.y, 18, colors, 160, 'star')
    for (let i = 0; i < 8; i++) {
      const a = (Math.PI * 2 * i) / 8
      pushSpark(to.x, to.y, Math.cos(a) * 40, Math.sin(a) * 40, 0.4, 4, colors[i % colors.length], 'orb')
    }
  }
}

function syncStrikeFx(anim, party, foes) {
  const key = anim.kind === 'none' ? '' :
    [anim.kind, anim.side, anim.actor, anim.target, anim.amount, anim.text].join('|')
  if (key && key !== lastFxKey) {
    lastFxKey = key
    spawnStrikeFx(anim, party, foes)
  }
  if (!key) lastFxKey = ''
}

function updateStrikeFx(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]
    p.life -= dt
    p.x += p.vx * dt
    p.y += p.vy * dt
    p.vx *= 0.92
    p.vy *= 0.92
    if (p.shape === 'orb') p.vy -= 20 * dt
    if (p.life <= 0) particles.splice(i, 1)
  }
  for (let i = fxBeams.length - 1; i >= 0; i--) {
    const b = fxBeams[i]
    if (b.delay > 0) { b.delay -= dt; continue }
    b.life -= dt
    if (b.life <= 0) fxBeams.splice(i, 1)
  }
}

function drawStrikeFx() {
  fxBeams.forEach(b => {
    if (b.delay > 0) return
    const t = Math.max(0, b.life / b.max)
    ctx.save()
    ctx.globalAlpha = Math.min(1, t * 1.4)
    ctx.strokeStyle = b.color
    ctx.shadowColor = b.color
    ctx.shadowBlur = 12
    if (b.style === 'slash') {
      ctx.lineWidth = 3 + (1 - t) * 2
      ctx.beginPath()
      const mx = (b.x0 + b.x1) / 2
      const my = (b.y0 + b.y1) / 2 - 40 * t
      ctx.moveTo(b.x0, b.y0)
      ctx.quadraticCurveTo(mx, my, b.x1, b.y1)
      ctx.stroke()
      ctx.strokeStyle = '#ffffff'
      ctx.lineWidth = 1.2
      ctx.stroke()
    } else if (b.style === 'arrow') {
      const prog = 1 - t
      const x = b.x0 + (b.x1 - b.x0) * Math.min(1, prog * 1.35)
      const y = b.y0 + (b.y1 - b.y0) * Math.min(1, prog * 1.35)
      ctx.lineWidth = 2
      ctx.beginPath()
      ctx.moveTo(b.x0, b.y0)
      ctx.lineTo(x, y)
      ctx.stroke()
      // arrowhead
      const ang = Math.atan2(b.y1 - b.y0, b.x1 - b.x0)
      ctx.fillStyle = b.color
      ctx.beginPath()
      ctx.moveTo(x, y)
      ctx.lineTo(x - Math.cos(ang - 0.4) * 10, y - Math.sin(ang - 0.4) * 10)
      ctx.lineTo(x - Math.cos(ang + 0.4) * 10, y - Math.sin(ang + 0.4) * 10)
      ctx.closePath()
      ctx.fill()
    } else if (b.style === 'bolt') {
      ctx.lineWidth = 2.5
      ctx.beginPath()
      let x = b.x0, y = b.y0
      ctx.moveTo(x, y)
      const steps = 6
      for (let s = 1; s <= steps; s++) {
        const p = s / steps
        const nx = b.x0 + (b.x1 - b.x0) * p
        const ny = b.y0 + (b.y1 - b.y0) * p + Math.sin(p * 18 + b.life * 30) * 8 * (1 - p)
        ctx.lineTo(nx, ny)
      }
      ctx.stroke()
      ctx.fillStyle = b.color
      ctx.globalAlpha = t
      ctx.beginPath()
      ctx.arc(b.x1, b.y1, 6 + (1 - t) * 10, 0, Math.PI * 2)
      ctx.fill()
    }
    ctx.restore()
  })

  particles.forEach(p => {
    const a = Math.max(0, p.life / p.max)
    ctx.save()
    ctx.globalAlpha = a
    ctx.fillStyle = p.color
    ctx.shadowColor = p.color
    ctx.shadowBlur = 8
    if (p.shape === 'slash') {
      ctx.translate(p.x, p.y)
      ctx.rotate(Math.atan2(p.vy, p.vx))
      ctx.fillRect(-p.size * 2, -p.size * 0.35, p.size * 4, p.size * 0.7)
    } else if (p.shape === 'feather') {
      ctx.beginPath()
      ctx.ellipse(p.x, p.y, p.size * 1.6, p.size * 0.6, Math.atan2(p.vy, p.vx), 0, Math.PI * 2)
      ctx.fill()
    } else if (p.shape === 'star') {
      ctx.translate(p.x, p.y)
      ctx.rotate(a * 6)
      ctx.beginPath()
      for (let i = 0; i < 4; i++) {
        const ang = (i * Math.PI) / 2
        ctx.lineTo(Math.cos(ang) * p.size * 2, Math.sin(ang) * p.size * 2)
        ctx.lineTo(Math.cos(ang + Math.PI / 4) * p.size * 0.5, Math.sin(ang + Math.PI / 4) * p.size * 0.5)
      }
      ctx.closePath()
      ctx.fill()
    } else if (p.shape === 'orb') {
      ctx.beginPath()
      ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2)
      ctx.fill()
    } else {
      ctx.beginPath()
      ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2)
      ctx.fill()
    }
    ctx.restore()
  })
  ctx.shadowBlur = 0
  ctx.globalAlpha = 1
}

function drawSilhouette(x, y, w, h, color, kind) {
  ctx.save()
  ctx.translate(x, y)
  ctx.shadowColor = 'rgba(0,0,0,0.45)'
  ctx.shadowBlur = 6
  ctx.shadowOffsetX = 2
  ctx.shadowOffsetY = 3
  ctx.lineJoin = 'round'
  ctx.lineCap = 'round'

  const fill = () => { ctx.fill() }
  const stroke = (lw) => { ctx.lineWidth = lw || 2; ctx.stroke() }

  if (kind === 'goblin') {
    ctx.fillStyle = color
    ctx.strokeStyle = color
    // Goblin Scout — squat, big ears, snout, crooked knife
    ctx.beginPath()
    ctx.ellipse(w * 0.5, h * 0.62, w * 0.28, h * 0.28, 0, 0, Math.PI * 2); fill()
    // head
    ctx.beginPath()
    ctx.ellipse(w * 0.5, h * 0.32, w * 0.22, h * 0.2, 0, 0, Math.PI * 2); fill()
    // ears
    ctx.beginPath()
    ctx.moveTo(w * 0.28, h * 0.28)
    ctx.lineTo(w * 0.05, h * 0.08)
    ctx.lineTo(w * 0.32, h * 0.38)
    ctx.closePath(); fill()
    ctx.beginPath()
    ctx.moveTo(w * 0.72, h * 0.28)
    ctx.lineTo(w * 0.95, h * 0.08)
    ctx.lineTo(w * 0.68, h * 0.38)
    ctx.closePath(); fill()
    // snout
    ctx.beginPath()
    ctx.ellipse(w * 0.5, h * 0.4, w * 0.12, h * 0.08, 0, 0, Math.PI * 2); fill()
    // eye dots
    ctx.save(); ctx.globalAlpha = 0.4; ctx.fillStyle = '#07071a'
    ctx.beginPath(); ctx.arc(w * 0.42, h * 0.28, w * 0.04, 0, Math.PI * 2); fill()
    ctx.beginPath(); ctx.arc(w * 0.58, h * 0.28, w * 0.04, 0, Math.PI * 2); fill()
    ctx.restore(); ctx.fillStyle = color
    // knife
    ctx.beginPath()
    ctx.moveTo(w * 0.72, h * 0.5)
    ctx.lineTo(w * 0.98, h * 0.38)
    ctx.lineTo(w * 0.74, h * 0.58)
    ctx.closePath(); fill()
    // legs
    ctx.fillRect(w * 0.36, h * 0.82, w * 0.1, h * 0.14)
    ctx.fillRect(w * 0.54, h * 0.82, w * 0.1, h * 0.14)
  } else if (kind === 'slime') {
    ctx.fillStyle = color
    ctx.strokeStyle = color
    // Neon Slime — drippy blob, eyes, highlight
    ctx.beginPath()
    ctx.moveTo(w * 0.15, h * 0.55)
    ctx.bezierCurveTo(w * 0.1, h * 0.2, w * 0.9, h * 0.2, w * 0.85, h * 0.55)
    ctx.bezierCurveTo(w * 0.9, h * 0.85, w * 0.1, h * 0.85, w * 0.15, h * 0.55)
    ctx.closePath(); fill()
    // drip
    ctx.beginPath()
    ctx.ellipse(w * 0.3, h * 0.88, w * 0.06, h * 0.1, 0, 0, Math.PI * 2); fill()
    ctx.beginPath()
    ctx.ellipse(w * 0.7, h * 0.9, w * 0.05, h * 0.08, 0, 0, Math.PI * 2); fill()
    // eyes
    ctx.save(); ctx.fillStyle = '#07071a'; ctx.globalAlpha = 0.55
    ctx.beginPath(); ctx.ellipse(w * 0.38, h * 0.45, w * 0.07, h * 0.1, 0, 0, Math.PI * 2); fill()
    ctx.beginPath(); ctx.ellipse(w * 0.62, h * 0.45, w * 0.07, h * 0.1, 0, 0, Math.PI * 2); fill()
    ctx.fillStyle = '#ffffff'; ctx.globalAlpha = 0.9
    ctx.beginPath(); ctx.arc(w * 0.4, h * 0.42, w * 0.025, 0, Math.PI * 2); fill()
    ctx.beginPath(); ctx.arc(w * 0.64, h * 0.42, w * 0.025, 0, Math.PI * 2); fill()
    ctx.restore()
    // shine
    ctx.save(); ctx.globalAlpha = 0.35; ctx.fillStyle = '#ffffff'
    ctx.beginPath(); ctx.ellipse(w * 0.35, h * 0.32, w * 0.08, h * 0.05, -0.5, 0, Math.PI * 2); fill()
    ctx.restore()
  } else if (kind === 'bandit') {
    ctx.fillStyle = color
    ctx.strokeStyle = color
    // Forest Bandit — hooded cloak, mask, short blade
    ctx.beginPath()
    ctx.moveTo(w * 0.32, h * 0.28)
    ctx.lineTo(w * 0.68, h * 0.28)
    ctx.lineTo(w * 0.78, h * 0.85)
    ctx.lineTo(w * 0.22, h * 0.85)
    ctx.closePath(); fill()
    // hood
    ctx.beginPath()
    ctx.moveTo(w * 0.28, h * 0.32)
    ctx.quadraticCurveTo(w * 0.5, h * 0.02, w * 0.72, h * 0.32)
    ctx.lineTo(w * 0.62, h * 0.38)
    ctx.quadraticCurveTo(w * 0.5, h * 0.22, w * 0.38, h * 0.38)
    ctx.closePath(); fill()
    // mask band
    ctx.save(); ctx.globalAlpha = 0.4; ctx.fillStyle = '#07071a'
    ctx.fillRect(w * 0.36, h * 0.34, w * 0.28, h * 0.08)
    ctx.restore(); ctx.fillStyle = color
    // dagger
    ctx.beginPath()
    ctx.moveTo(w * 0.78, h * 0.48)
    ctx.lineTo(w * 0.98, h * 0.36)
    ctx.lineTo(w * 0.82, h * 0.55)
    ctx.closePath(); fill()
    ctx.fillRect(w * 0.72, h * 0.5, w * 0.1, h * 0.08)
    // boots
    ctx.fillRect(w * 0.3, h * 0.85, w * 0.12, h * 0.12)
    ctx.fillRect(w * 0.58, h * 0.85, w * 0.12, h * 0.12)
  } else if (kind === 'archer') {
    ctx.fillStyle = color
    ctx.strokeStyle = color
    // Ash Archer — cloak + longbow aimed toward the party
    ctx.beginPath()
    ctx.moveTo(w * 0.4, h * 0.22)
    ctx.lineTo(w * 0.65, h * 0.22)
    ctx.lineTo(w * 0.7, h * 0.8)
    ctx.lineTo(w * 0.35, h * 0.8)
    ctx.closePath(); fill()
    ctx.beginPath()
    ctx.ellipse(w * 0.52, h * 0.18, w * 0.14, h * 0.12, 0, 0, Math.PI * 2); fill()
    // cloak
    ctx.beginPath()
    ctx.moveTo(w * 0.65, h * 0.3)
    ctx.lineTo(w * 0.92, h * 0.78)
    ctx.lineTo(w * 0.65, h * 0.78)
    ctx.closePath(); fill()
    // longbow facing party (right side of canvas = enemies face right toward heroes)
    ctx.beginPath()
    ctx.arc(w * 0.55, h * 0.48, w * 0.32, -0.9, 0.9)
    stroke(3)
    ctx.beginPath()
    ctx.moveTo(w * 0.55 + Math.cos(-0.9) * w * 0.32, h * 0.48 + Math.sin(-0.9) * w * 0.32)
    ctx.lineTo(w * 0.55 + Math.cos(0.9) * w * 0.32, h * 0.48 + Math.sin(0.9) * w * 0.32)
    stroke(1.5)
    // arrow toward heroes (to the right)
    ctx.beginPath()
    ctx.moveTo(w * 0.35, h * 0.48)
    ctx.lineTo(w * 0.95, h * 0.48)
    stroke(2)
    ctx.beginPath()
    ctx.moveTo(w * 0.95, h * 0.48)
    ctx.lineTo(w * 0.86, h * 0.42)
    ctx.lineTo(w * 0.86, h * 0.54)
    ctx.closePath(); fill()
  } else if (kind === 'wyrm' || kind === 'boss') {
    ctx.fillStyle = color
    ctx.strokeStyle = color
    // Shadow Wyrm — coiled body, wings, horned head, tail
    // body coil
    ctx.beginPath()
    ctx.ellipse(w * 0.48, h * 0.58, w * 0.32, h * 0.22, -0.2, 0, Math.PI * 2); fill()
    // neck
    ctx.beginPath()
    ctx.moveTo(w * 0.55, h * 0.45)
    ctx.quadraticCurveTo(w * 0.72, h * 0.28, w * 0.78, h * 0.18)
    ctx.lineTo(w * 0.68, h * 0.14)
    ctx.quadraticCurveTo(w * 0.58, h * 0.32, w * 0.42, h * 0.48)
    ctx.closePath(); fill()
    // head
    ctx.beginPath()
    ctx.ellipse(w * 0.82, h * 0.16, w * 0.16, h * 0.1, -0.3, 0, Math.PI * 2); fill()
    // snout
    ctx.beginPath()
    ctx.moveTo(w * 0.92, h * 0.14)
    ctx.lineTo(w * 1.02, h * 0.18)
    ctx.lineTo(w * 0.9, h * 0.22)
    ctx.closePath(); fill()
    // horns
    ctx.beginPath()
    ctx.moveTo(w * 0.72, h * 0.1)
    ctx.lineTo(w * 0.68, h * -0.02)
    ctx.lineTo(w * 0.78, h * 0.1)
    ctx.closePath(); fill()
    ctx.beginPath()
    ctx.moveTo(w * 0.8, h * 0.08)
    ctx.lineTo(w * 0.84, h * -0.04)
    ctx.lineTo(w * 0.88, h * 0.1)
    ctx.closePath(); fill()
    // eye
    ctx.save(); ctx.fillStyle = '#ff2d78'; ctx.shadowColor = '#ff2d78'
    ctx.beginPath(); ctx.arc(w * 0.86, h * 0.14, w * 0.035, 0, Math.PI * 2); fill()
    ctx.restore(); ctx.fillStyle = color; ctx.shadowColor = color
    // wings
    ctx.beginPath()
    ctx.moveTo(w * 0.4, h * 0.42)
    ctx.lineTo(w * 0.08, h * 0.08)
    ctx.lineTo(w * 0.18, h * 0.42)
    ctx.lineTo(w * 0.05, h * 0.55)
    ctx.lineTo(w * 0.38, h * 0.52)
    ctx.closePath(); fill()
    ctx.beginPath()
    ctx.moveTo(w * 0.52, h * 0.4)
    ctx.lineTo(w * 0.7, h * 0.05)
    ctx.lineTo(w * 0.62, h * 0.38)
    ctx.closePath(); fill()
    // tail
    ctx.beginPath()
    ctx.moveTo(w * 0.2, h * 0.62)
    ctx.quadraticCurveTo(w * -0.05, h * 0.7, w * 0.08, h * 0.92)
    ctx.quadraticCurveTo(w * 0.2, h * 0.78, w * 0.3, h * 0.7)
    ctx.closePath(); fill()
    // spines
    for (let i = 0; i < 4; i++) {
      const sx = w * (0.3 + i * 0.1)
      const sy = h * (0.42 - i * 0.02)
      ctx.beginPath()
      ctx.moveTo(sx, sy)
      ctx.lineTo(sx + w * 0.03, sy - h * 0.1)
      ctx.lineTo(sx + w * 0.06, sy)
      ctx.closePath(); fill()
    }
  } else {
    ctx.fillStyle = color
    ctx.strokeStyle = color
    // generic foe fallback
    ctx.beginPath()
    ctx.ellipse(w * 0.5, h * 0.55, w * 0.32, h * 0.32, 0, 0, Math.PI * 2); fill()
    ctx.beginPath()
    ctx.ellipse(w * 0.5, h * 0.22, w * 0.18, h * 0.16, 0, 0, Math.PI * 2); fill()
  }

  ctx.restore()
  ctx.shadowBlur = 0
  ctx.shadowOffsetX = 0
  ctx.shadowOffsetY = 0
  ctx.globalAlpha = 1
}

function foeKind(id) {
  if (id === 'wyrm') return 'wyrm'
  if (id === 'goblin') return 'goblin'
  if (id === 'slime') return 'slime'
  if (id === 'bandit') return 'bandit'
  if (id === 'archer') return 'archer'
  return 'foe'
}

function drawTitle(view) {
  ctx.fillStyle = '#07071a'
  ctx.fillRect(0, 0, W, H)
  const g = ctx.createLinearGradient(0, 0, W, H)
  g.addColorStop(0, 'rgba(184,79,255,0.25)')
  g.addColorStop(0.5, 'rgba(0,229,255,0.08)')
  g.addColorStop(1, 'rgba(255,45,120,0.2)')
  ctx.fillStyle = g
  ctx.fillRect(0, 0, W, H)

  ctx.fillStyle = '#ffd166'
  ctx.font = 'bold 42px Courier New'
  ctx.textAlign = 'center'
  ctx.shadowColor = '#ffd166'
  ctx.shadowBlur = 18
  ctx.fillText('SYNTH FANTASY', W / 2, 180)
  ctx.shadowBlur = 0
  ctx.fillStyle = '#e8e0ff'
  ctx.font = '16px Courier New'
  ctx.fillText('A classic turn-based battle — Aria · Theron · Lyra', W / 2, 220)
  ctx.fillStyle = '#00e5ff'
  ctx.font = '14px Courier New'
  ctx.fillText(view.hint || 'Press Z / Enter to start', W / 2, 320)
  ctx.fillStyle = '#6a6490'
  ctx.font = '12px Courier New'
  ctx.fillText('Vertical slice sequel to RPG Adventure', W / 2, 360)
}

function drawEnd(view, title, color) {
  ctx.fillStyle = '#07071a'
  ctx.fillRect(0, 0, W, H)
  ctx.fillStyle = color
  ctx.font = 'bold 40px Courier New'
  ctx.textAlign = 'center'
  ctx.shadowColor = color
  ctx.shadowBlur = 20
  ctx.fillText(title, W / 2, 220)
  ctx.shadowBlur = 0
  ctx.fillStyle = '#e8e0ff'
  ctx.font = '14px Courier New'
  ctx.fillText(view.hint || '', W / 2, 280)
}

function drawBattle(view, dt) {
  const dtSafe = typeof dt === 'number' ? dt : 1 / 60
  drawBattleBackground(view.encounter ?? 0)
  syncHeroAnims(view, dtSafe)

  // Title strip
  ctx.fillStyle = '#ffd166'
  ctx.font = 'bold 13px Courier New'
  ctx.textAlign = 'left'
  ctx.shadowColor = 'rgba(0,0,0,0.65)'
  ctx.shadowBlur = 4
  ctx.fillText(view.title || '', 20, 28)
  ctx.shadowBlur = 0

  const anim = view.anim || { kind: 'none', timer: 0 }
  const pulse = anim.kind !== 'none' && anim.timer > 0.35 ? Math.sin(anim.timer * 40) * 3 : 0

  // Enemies left
  const foes = view.foes || []
  const party = view.party || []
  syncStrikeFx(anim, party, foes)
  updateStrikeFx(dtSafe)
  const foeHitKinds = { attack: 1, magic: 1, skill: 1 }
  foes.forEach((e, i) => {
    if (!e.alive && !(anim.side === 'hero' && foeHitKinds[anim.kind] && anim.target === i && anim.timer > 0)) return
    const shake = foeHitKinds[anim.kind] && anim.side === 'hero' && anim.target === i ? pulse : 0
    const boss = e.id === 'wyrm'
    const bw = boss ? 110 : 70
    const bh = boss ? 115 : 90
    const x = 80 + (i % 2) * 110 + shake - (boss ? 20 : 0)
    const y = 95 + Math.floor(i / 2) * 88 - (boss ? 18 : 0)
    const alpha = e.alive ? 1 : 0.35
    ctx.globalAlpha = alpha
    const flash = foeHitKinds[anim.kind] && anim.side === 'hero' && anim.target === i && anim.timer > 0.2
    drawSilhouette(x, y, bw, bh, flash ? '#ffffff' : e.color, foeKind(e.id))
    ctx.globalAlpha = 1
    ctx.fillStyle = '#e8e0ff'
    ctx.font = '12px Courier New'
    ctx.textAlign = 'center'
    ctx.fillText(e.name, x + bw / 2, y + bh + 14)
    drawBar(x + (bw - 70) / 2, y + bh + 18, 70, 7, e.maxHp ? e.hp / e.maxHp : 0, '#ff2d78')
    if (foeHitKinds[anim.kind] && anim.side === 'hero' && anim.target === i && anim.amount > 0 && anim.timer > 0.05) {
      ctx.fillStyle = '#ffd166'
      ctx.font = 'bold 16px Courier New'
      ctx.fillText('-' + anim.amount, x + bw / 2, y - 8 + (0.55 - anim.timer) * 30)
    }
  })

  // Party right — sprite sheets
  const allyFxKinds = { heal: 1, item: 1, defend: 1, guard: 1 }
  party.forEach((h, i) => {
    const shake = anim.side === 'enemy' && anim.target === i ? pulse : 0
    const x = 600 + shake * -0.5
    const y = 70 + i * 78
    const drawW = 100
    const drawH = 90
    const active = view.phase !== 'enemy_act' && view.phase !== 'resolve' && view.active === i
    ctx.globalAlpha = h.alive ? 1 : 0.45
    if (active) {
      ctx.strokeStyle = '#ffd166'
      ctx.lineWidth = 2
      roundRect(x - 4, y - 4, drawW + 8, drawH + 8, 6)
      ctx.stroke()
    }
    const flash = (anim.side === 'enemy' && anim.target === i && anim.timer > 0.2) ||
      (allyFxKinds[anim.kind] && anim.side === 'hero' && anim.target === i && anim.timer > 0.2)
    drawHeroSprite(h, i, x, y, drawW, drawH, flash)
    ctx.globalAlpha = 1
    if (h.defending) {
      ctx.fillStyle = '#00e5ff'
      ctx.font = '10px Courier New'
      ctx.textAlign = 'center'
      ctx.fillText('GUARD', x + drawW / 2, y - 2)
    }
    if (anim.side === 'enemy' && anim.target === i && anim.amount > 0 && anim.timer > 0.05) {
      ctx.fillStyle = '#ff5566'
      ctx.font = 'bold 16px Courier New'
      ctx.textAlign = 'center'
      ctx.fillText('-' + anim.amount, x + drawW / 2, y - 6 + (0.55 - anim.timer) * 30)
    }
    if ((anim.kind === 'heal' || anim.kind === 'item') && anim.target === i && anim.amount > 0 && anim.timer > 0.05) {
      ctx.fillStyle = '#06d6a0'
      ctx.font = 'bold 16px Courier New'
      ctx.textAlign = 'center'
      ctx.fillText('+' + anim.amount, x + drawW / 2, y - 6)
    }
  })

  // Strike FX over the field, under the HUD
  drawStrikeFx()

  // Battle log — bottom strip above menus (moved off the field)
  drawPanel(16, 308, 768, 28, 'rgba(10,6,24,0.85)', 'rgba(255,209,102,0.35)')
  const logs = view.logs || []
  ctx.font = '11px Courier New'
  ctx.textAlign = 'left'
  ctx.fillStyle = '#ffd166'
  ctx.fillText(logs[0] || '', 28, 326)

  // Command / menu window
  drawPanel(16, 342, 280, 162, 'rgba(16,16,40,0.92)', 'rgba(184,79,255,0.45)')
  ctx.fillStyle = '#b84fff'
  ctx.font = 'bold 12px Courier New'
  ctx.textAlign = 'left'
  const modeLabel = view.menu_mode === 'command' ? 'COMMAND' :
    view.menu_mode === 'magic' ? 'MAGIC' :
    view.menu_mode === 'skill' ? 'SKILL' :
    view.menu_mode === 'item' ? 'ITEM' :
    view.menu_mode === 'target_enemy' ? 'TARGET' :
    view.menu_mode === 'target_ally' ? 'ALLY' : String(view.menu_mode || '').toUpperCase()
  const actor = party[view.active]
  const actorName = actor ? actor.name : ''
  ctx.fillText(modeLabel + (actorName ? ' — ' + actorName : ''), 28, 362)

  const menu = view.menu || []
  const canPick = view.phase === 'hero_command' || view.phase === 'hero_pick'
  const nowMs = performance.now()
  menu.forEach((row, i) => {
    const yy = 382 + i * 22
    const selected = canPick && i === view.menu_index
    const flashed = canPick && i === flashIdx && nowMs < flashUntil
    if (flashed) {
      ctx.fillStyle = 'rgba(255,209,102,0.45)'
      ctx.fillRect(24, yy - 14, 260, 20)
      ctx.strokeStyle = '#ffd166'
      ctx.lineWidth = 1.5
      ctx.strokeRect(24.5, yy - 13.5, 259, 19)
      ctx.fillStyle = '#ffd166'
      ctx.fillText('▸ ' + row.label, 32, yy)
    } else if (selected) {
      ctx.fillStyle = 'rgba(0,229,255,0.22)'
      ctx.fillRect(24, yy - 14, 260, 20)
      ctx.strokeStyle = 'rgba(0,229,255,0.7)'
      ctx.lineWidth = 1
      ctx.strokeRect(24.5, yy - 13.5, 259, 19)
      ctx.fillStyle = '#00e5ff'
      ctx.fillText('▸ ' + row.label, 32, yy)
    } else {
      ctx.fillStyle = '#c8c0e8'
      ctx.fillText('  ' + row.label, 32, yy)
    }
  })
  if (!canPick) {
    ctx.fillStyle = '#6a6490'
    ctx.font = '12px Courier New'
    ctx.fillText(view.phase === 'resolve' ? '…resolving' :
      view.phase === 'enemy_act' ? 'Enemy turn…' :
      view.phase === 'battle_clear' ? 'Victory! Confirm to continue' : view.phase, 32, 490)
  }

  // Party status strip
  drawPanel(312, 342, 472, 162, 'rgba(16,16,40,0.92)', 'rgba(0,229,255,0.35)')
  party.forEach((h, i) => {
    const yy = 360 + i * 48
    const id = heroSpriteId(h)
    drawPortrait(id, 322, yy - 14, 36, h.alive)
    ctx.fillStyle = h.alive ? h.color : '#6a6490'
    ctx.font = 'bold 13px Courier New'
    ctx.textAlign = 'left'
    ctx.fillText(h.name, 366, yy)
    ctx.fillStyle = '#6a6490'
    ctx.font = '11px Courier New'
    ctx.fillText(h.heroClass.toUpperCase(), 440, yy)
    ctx.fillStyle = '#e8e0ff'
    ctx.fillText('HP ' + h.hp + '/' + h.maxHp, 520, yy)
    drawBar(520, yy + 6, 100, 6, h.maxHp ? h.hp / h.maxHp : 0, '#ff2d78')
    ctx.fillStyle = '#e8e0ff'
    ctx.fillText('MP ' + h.mp + '/' + h.maxMp, 640, yy)
    drawBar(640, yy + 6, 110, 6, h.maxMp ? h.mp / h.maxMp : 0, '#00e5ff')
  })

  ctx.fillStyle = '#6a6490'
  ctx.font = '11px Courier New'
  ctx.textAlign = 'right'
  ctx.fillText('Potions x' + (view.potions ?? 0), W - 20, 28)
  ctx.fillText(view.hint || '', W - 20, 48)
}

// Menu geometry for click hit-testing (kept in sync with drawBattle)
const MENU_HIT = { x0: 16, x1: 296, y0: 368, rowH: 22 }

function draw(dt) {
  const view = get_view()
  if (view.scene === 'title') drawTitle(view)
  else if (view.scene === 'victory') drawEnd(view, 'VICTORY', '#06d6a0')
  else if (view.scene === 'gameover') drawEnd(view, 'GAME OVER', '#ff2d78')
  else drawBattle(view, dt)
}

let flashIdx = -1
let flashUntil = 0
let confirmAt = 0

function onConfirm() { menu_confirm() }
function onCancel() { menu_cancel() }
function onUp() { menu_move(-1) }
function onDown() { menu_move(1) }

document.addEventListener('keydown', e => {
  if (confirmAt) return
  if (e.code === 'ArrowUp' || e.code === 'KeyW') { e.preventDefault(); onUp() }
  else if (e.code === 'ArrowDown' || e.code === 'KeyS') { e.preventDefault(); onDown() }
  else if (e.code === 'Enter' || e.code === 'KeyZ' || e.code === 'Space') { e.preventDefault(); onConfirm() }
  else if (e.code === 'Escape' || e.code === 'KeyX' || e.code === 'Backspace') { e.preventDefault(); onCancel() }
})

canvas.addEventListener('click', e => {
  if (confirmAt) return
  const view = get_view()
  if (view.scene !== 'battle') { onConfirm(); return }
  if (view.phase === 'battle_clear') { onConfirm(); return }
  if (view.phase !== 'hero_command' && view.phase !== 'hero_pick') return

  const rect = canvas.getBoundingClientRect()
  const x = (e.clientX - rect.left) * W / rect.width
  const y = (e.clientY - rect.top) * H / rect.height
  const menu = view.menu || []
  if (x >= MENU_HIT.x0 && x <= MENU_HIT.x1 && y >= MENU_HIT.y0) {
    const idx = Math.floor((y - MENU_HIT.y0) / MENU_HIT.rowH)
    if (idx >= 0 && idx < menu.length) {
      menu_set_index(idx)
      flashIdx = idx
      flashUntil = performance.now() + 160
      confirmAt = performance.now() + 160
    }
  }
})

let prev = performance.now()
function loop(now) {
  const dt = Math.min((now - prev) / 1000, 0.05)
  prev = now
  if (confirmAt && now >= confirmAt) {
    confirmAt = 0
    menu_confirm()
  }
  tick(dt)
  draw(dt)
  requestAnimationFrame(loop)
}
loadPartyAssets().finally(() => requestAnimationFrame(loop))
</script>
