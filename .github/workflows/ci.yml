name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build bootstrap toolchain
        run: npm run build:toolchain

      - name: Compiler parity + fixed-point bootstrap
        run: npm run test:ci

      - name: Run Synth example tests
        run: npm test

      - name: VS Code extension grammar test
        run: node tools/test_grammar.js

      - name: Package VS Code extension
        run: npx @vscode/vsce package --no-dependencies
        working-directory: vscode-extension
